body:
  text: 丹霞今釋淡歸造侍者古心得編經前演義圓教天台判四教藏通別圓不立頓教蓋以圓攝頓也雖然漸中之頓為天台圓攝頓中之頓不為天台圓攝請即以其教明之其列外凡五品一初隨喜心或值善知識或從經卷圓聞妙理起圓信解而修圓行成十乘觀法至於究竟金剛後心十觀成乘圓極之果如函合蓋豈非頓耶然以十觀品品深明而入圓位六根清淨謂之似解逮十住聖位初發心住始證一分三德位位破一分無明四十一分無明盡始成妙覺豈非頓中之漸耶楞嚴云理則頓悟乘悟併銷事以漸除因次第盡既有併銷之理即無待於漸破漸證此所以漸破漸證以其為圓教似解也十信為似解十住為真中智解則為似證則為真由解得證併不可云頓中之漸當其證後頓中之漸果當其解時漸中之頓因故曰漸中之頓為天台圓攝也今有最上利根於初隨喜即究竟金剛後心逆流而出即地即向即行即住即聖即凡即內即外非橫非豎非單非復非正非旁非首非尾當其證時即無所證豈有所破既無所破亦無能證豈復有漸破漸證之説則頓中之頓故不為天台圓攝也夫頓與圓初無二理而解證既分便如兩事從解得證則有漸行從證起行元無頓解此宗門所自擅為教外別傳者天台知之而不立非以圓攝頓蓋頓中之頓非圓所攝也教有漸義即亦非教所收也又談圓教者必以華嚴為宗疏主引之云初發心住便成正覺所有功德三世諸佛歎不能盡而復云初發心住證一分三德破一分無明是有四十分無明未破也立一圓鏡於此方便畫為四十一分三德以喻光無明以喻垢先破後證先證後破不出此一分則顯一分光存四十分垢全成垢鏡即至地上半光半垢安得圓明若云明體自圓垢相漸去則所謂明者解耳非證也亦分證耳非圓證也方山長者云十住初位即十行十向十地等覺互相貫通一位得五十法門位位中二千五百總別之義齊現立一圓鏡於此一則一現多則多現半則半現滿則滿現重重涉入則重重現人自見其一多半滿重重現影而有次第本鏡圓明無次第不次第見八歲龍女一念成佛豈於南方無垢世界猶有分破之無明若此初住位非圓證則所謂便成正覺義亦不合并所謂初隨喜心圓聞妙理一法一切法一切法一法非一非一切起圓信解而修圓行一行一切行其義俱不成矣且如理則頓悟乘悟併銷則理尚不存豈事猶有礙若有待除之事仍有未銷之理此義較然必無兩立故方山云有三種五位十地一修假詮假智假真如二修分真分證一分真如三頓修頓證佛境圓滿真如如解深密經但立十地斷惑分劑仁王經五位十地從凡漸習積行多生或謂地前斷惑地上見道是權教假真如門涅槃經十住菩薩少分見性乃至十地未能了了即分修分證真如瓔珞經菩薩入聖位但法性流中心心寂滅自然流入妙覺大海此為圓教正宗而方山尚云華嚴經意即不然識滅時亡情塵頓絶設凡夫住世百年及以多劫而於自己不見須臾可遷不見當成佛不見已成佛不見現成佛更有何生不成佛更有何生而成佛圓覺云惟除頓覺人併法不隨順自非出格悟門決不信有此沒量大人境界也無作疏曰戒體者不起而已起即性無作假色何也戒體者性而已無作者不起而已一切性不起或疑其起起即性性即無作無作不可見假色而見色豈有作哉作而成色見作豈有作見豈有見哉經論互靜蓋為有無作所礙有無作即無無作耳談無者舉瓔珞經一切聖凡戒盡以心為體或言真諦為戒體或言願為戒體無別無作心無作真諦與願亦無作已有無作竟故無別無作舉大經云聖行觀析無常阿闍世王觀析境界但明色心不道無作色無作心無作已道無作竟故不道無作皆有無作之遮詞也談有者謂心力大能生諸法牽果報別有一善依師發或依定或依道品發故有無作心是有耶能生諸法乃至果報是有耶依師所發依定依道所發是有耶無作是有耶而自云亦言無教小乘已説無無作竟大乘明戒是色聚舉大論罪不罪不可得具足尸羅云此是戒度正體罪不罪不可得尸羅可得耶正體又可得耶舉優婆塞戒經譬如有面有鏡則有像現如是因作便有無作因緣不可得像與鏡與面皆不可得無作又可得耶已説無無作竟而相持以為有無作皆無無作之表詞也今所用有無作者因戒故用有能持有所持有得有不得有可護持有方便可令具足即知別有無作能持戒心別即可耳無作者一切法之總體於戒法中別名戒體無作攝戒戒不攝無作戒不能攝無作而欲有無作無作能攝戒而欲無無作是小無作而為一心生礙也一心所以無礙者以無作故無作所以無礙以無作無故無作無故一切有佛有佛無作衆生有衆生無作有情有有情無作無情有無情無作一切有無作者以一切無故佛不可得衆生不可得有情無情俱不可得不可得者亦不可得無無作即有無作耳言遮不更表言表不更遮言耳言耳安用諍為發無作戒以無作為體定與道皆以無作為體無作共戒與定道此無作總也定與道共戒此無作別也定共於定心中發無作道共於見諦中發無作此發戒耳無作安有發不發耶止觀師云中道觀心亦發有師云入禪定能發無作欲界定不發有云欲界定念處前皆發有云增上心發下劣心不發無記心不發此不發戒耳發亦別無作耳正發無作則無一人無一時無一處而不發也乃至論興廢亦戒興戒廢耳興廢之中有難有易有久有暫亦戒無作中難易久暫耳正論無作則無一人無一時無一處而不興也無作兼動不動兼止兼行兼大兼小兼善兼惡一切動不動法止法行法大小法善惡法皆有無作體而無作非動不動非止非行非大小非善惡非別有一體以其皆有無作體謂之有無作以其非別有一體謂之無無作此亦戒無作體之有無耳無作安有有無耶無三障夫性本無名因言成體當其作用聊如夢幻而云有障者暫隔則隱隱非無隔隔非無隱譬於不見明珠非無見者又珠偶不見非無珠也疏直判之曰無三障斯乃稱性之談耳煩惱常有故不説障然業底於重出煩惱重乃至底於報障亦煩惱重煩惱實為業主而不説障煩惱故無性也一切性無性故煩惱無性由念相續為時長短風吹片雲不説為障重雲蔽空而説業障積陰兼旬説為報障本天不沒障亦本無七逆十重悔已非障地獄餓鬼報盡非障然猶非障非無障義若達無生則知本天無本天性所現晴空無晴空性重雲積陰亦復如是非作故無本性無故曰審爾則佛及衆生皆增語耳奚事戒為以未知性而為結戒既知性已戒亦無性於無性中説隨順法説障者隨順戒義説無障者隨順性義無障是性義無性是戒義有障是無障義説則不礙有無不説亦豈有無所得而礙耶經序分光告盧舍那佛放光光告千華上佛龍勝尊者於座上現滿月相但聞法音不見其形佛祖故同一提持也光中全告告中全光眼中全聞耳中全見依正同隱是二是一三身同顯非一非三此不思議光惟千華上佛塵塵剎剎之光互相酬答耳此土釋迦示凡夫身作同類攝以一塵一剎之機演塵塵剎剎之用彼不見多此不見少者一切衆生六門之光與釋迦一門之光交相涉入重重無盡如赤珠幢衆生不知忘其全光惟見一光作奇特觀釋迦知之忘其一光惟見全光作平等觀當是時閻浮提世界與蓮華臺藏世界無二土釋迦與盧舍那無二身一切微塵衆生與千華上佛無二性則諸見滿月相者皆滿月相不特龍勝收綸即盧舍那亦當結舌而不妨作奇特觀作平等觀何也諸佛衆生亂起亂滅即是體性虗空華光三昧千華上佛全身在體性虗空華光三昧中忽作兩時忽作兩地沒於蓮華臺藏出界還閻浮提世界沒已入體性虗空華光三昧還已出體性虗空華光三昧未沒之前已出之後畢竟是何三昧譬如神蛇自擲其身作寸寸斷斷已還續都無痕迹盡微塵世界佛與衆生離離合合祇一神蛇豈有是體性虗空華光三昧非體性虗空華光三昧又豈有入體性虗空華光三昧以前出體性虗空華光三昧以後耶起座自性清淨即無作戒體無作者不起而已盧舍那不起於赫赫天光師子座上而現千百億釋迦復化無量佛坐無量國土接無量衆生盧舍那未嘗起也千百億釋迦即盧舍那本身一切閻浮提即蓮華臺藏本世界起即不起也華嚴以釋迦現毗盧遮那故不起於座而為十處説法梵網以盧舍那現釋迦故起於座而為十處説法毗盧遮那有不起義釋迦亦有不起義釋迦有起義盧舍那亦有起義以盧舍那有起義故現釋迦起以釋迦有不起義故現毗盧遮那不起也衆生日用皆具此二義有為不住無為不住以不住故謂之自性清淨菩薩戒依之不住有為不住無為聲聞不爾故聲聞戒體為別無作菩薩戒體得大總持佛性種子夫心地法門舍那為千華上佛説而上被摩醯首羅天下被癡暗凡夫非泯聖凡蓋聖為凡果凡為聖因外記曰祭川者先河而後海一源也一委也此之謂知本然則三世諸佛豈敢忘三世一切衆生耶今直以盧舍那常誦一戒為諸佛菩薩本源未知衆生之為戒本源抑何異於不知本者夫戒非別結稱性而結佛非別成稱性而成使別有因則別有果戒以佛性為種子故能生佛佛性以衆生為種子故能成衆生一切衆生是情是心入佛性戒如水入水如火入火不見異相不見同相而不礙見異不礙見同何以故以此當彼即有兩當同於能當則無所當異於所當亦無能當今以佛戒當一切衆生如水入水以當其常有因故以衆生當一切佛戒如火入火以當其常住法身故法身為衆生常有故無異因衆生常住諸佛常住元無異果果當因因當果凡當聖聖當凡一當多多當一今當古古當今有兩當而無一當故無佛可成無衆生可度無一當不礙兩當故有戒可説耳十波羅提木叉出於世間謂之法戒亦云以揀非法者然菩薩是法法無菩薩衆生非法法無衆生法非法戒非法法戒三世佛説初説重説千百億説不能於衆生自性外別成一佛即不能於衆生自性外別結一戒直謂之一切衆生戒衆生無讓容佛無矜色衆生亦無矜色佛亦無讓容何也一切佛一切菩薩本源於自性清淨佛其海衆生其河一源也一委也此之謂知本故曰佛為衆生母衆生亦為佛母佛為衆生師衆生亦為佛師衆生於佛性戒頂戴受持佛戒於一切衆生自性清淨亦頂戴受持衆生報佛恩佛亦報衆生恩也經十重性戒聲聞律有性戒遮戒四波羅夷名性罪曰法爾性中有罪非佛結戒始禁故餘悉遮罪大乘因之亦以十重中前四為性罪此乖心地義夫自性清淨云者尚不著善染汗豈復著惡染汗則性且無性容有罪耶於內外中間覓罪性不可得容有罪性耶一切衆生以貪瞋癡而成罪業蓋是習耳習為罪因罪為習果因果法爾習無習性罪無罪性而況於性若謂餘罪由律始禁則無律亦不成罪是如來有故作故入之愆也夫謂之性戒則一切輕戒皆性戒以其能障性使不現故性既被障是名性戒即一切戒皆具性義他不具論如優婆塞以一飲酒而四戒悉破故謂之遮戒則一切重罪皆遮戒亦以其能障性使不現故遮不使障是名遮戒即一切戒皆具遮義他不具論亦如優婆塞以一飲酒而四戒悉破故如是則如來結戒不過遮其能為性障者性本無罪障有深淺而遮始有重輕一切戒皆遮戒即皆性戒然不可云性罪以與自性清淨相違故學大乘者不宜與聲聞無辨也殺大經云遮未來相續名之為殺菩薩所為於生死海中頭出頭沒也聲聞取滅盡定焦佛芽敗佛種佛訶為惡人宜矣比丘作不淨觀厭思身故自殺此聲聞結戒之始也菩薩則捨身矣聲聞殺人犯重殺畜生波逸提菩薩於一闡提欲害多衆生欲害正法者起大悲心而斷其命聲聞食五淨肉菩薩不食乃至不畜殺具不販賣殺具若然寧殺人不殺畜生人有罪可殺耳畜生無罪也畜生無大小釋尊因中現蝨身提婆達多為土蚤致牽害菩薩以道眼等觀無一微塵許衆生非佛性種子者佛性無可斷即未來相續亦無可斷此陰謝彼陰生誰為殺者而有殺戒則宜開宜遮一準於善惡也菩薩不斷未來相續者不斷善相續而斷惡相續惡相續不斷即善斷善斷即發菩提心之因斷成等正覺之果斷故殺一闡提者無罪闡提不斷佛性而斷善根畜生有少善根殺之有罪此於一念起處分別開分別遮分別用斷分別用續分別用三世三世不遮相續分別不遮相續用不遮相續而決定決定遮未來相續之惡續未來相續之善直至成佛自作如是教人作亦如是盜不與而取曰盜一切法無與者安得取乎今曰直取無上菩提無上菩提者孰與之天與之耶地與之耶父母師僧與之佛與之耶既無與之者乃以為有取之者是盜也千佛授手特授手云爾舉手而授之盧舍那有手千百億釋迦有手無量衆生亦有手彼手無所與此手無所取無所與而以為有所與亦盜也衆生不盜佛佛不盜衆生盧舍那不盜釋迦釋迦不盜盧舍那一切菩薩不盜成佛度衆生一切衆生不盜行菩薩道成佛捨生死犯殺取涅槃犯盜捨貪瞋癡犯殺取戒定慧犯盜捨我人衆生壽者犯殺取無我無人無衆生壽著犯盜捨取捨犯殺取無取無捨犯盜惡人竊大位攘大名橫取不義物菩薩方便奪之向之擅為己有者蕩然無存始知其非己有菩薩奪之亦非己有蓋以空合空耳一切物無主以衆生有我故有主當其我見熾然有主之理與勢不可以犯皆如鬼神如劫賊也於一切法有所取者無多無少一針一切草一草一切針一針一草即一切財物菩薩一切奪之譬之四大無常無一剎那不奪而人僴然自謂我自謂有主至於眼光落地我亦無主況我所有庶幾以空合空乎而劫賊之習之深者復墮於鬼神故菩薩能盜盜始能不盜然惟不盜始能盜盜沙彌盜聽布薩聲聞不與授具足戒此菩薩所不制法無所有彼乃盜空有僧於洞山下九十六轉語一僧潛聽惟最後一語不得乃至給侍三年終不為説於病時持刀劫之菩薩若見且為行賞何以故最後一語彼僧之一針一草也彼以有所得心守之劫之而後空此以有所得心劫之得之而又空乃為兩得相見耳淫愛即淫取即盜淫有內色有外色求於人為外求於己為內有求有得有住皆淫業也菩薩不住色聲香味觸法而行布施施者淫之良藥不住者施之本方一切女人乃至畜生諸天鬼神女六道三界法也母女姊妹六親三世法也非道出二十五有離生滅耽寂滅法也我有箇老婆出世無人見早晚共一處自然有方便五祖老一時闌入白衣隊中若能遣此老婆一生參學事畢衆生本淨今曰淨法與人蓋為愛不淨者示有淨法愛淨者示有與法亦菩薩方便妄語耳妄語有淨有穢有得有失有生滅有去來有常有無常有一有異皆妄語也見言不見不見言見是妄語見言見不見言不見遂非妄語耶識得見言不見不見言見始可見言見不見言不見身是妄體心是妄名身心即妄語矣知身心妄語即無身心於此見身心語身心謂之正語正見菩薩有菩薩妄語聲聞有聲聞妄語不可相濫菩薩初發心時信我與衆生已成佛竟如是向人説我已成佛為起衆生增上擔荷心故無罪以名聞利養現欺誑相則結妄語重彼雖未得而本無失亦非大妄語佛是衆生本有非分外故若説得四果得天龍來鬼神來是下劣妄語菩薩畢竟一生成佛捨大説小豈堪結重而引聲聞例結重即乖菩薩本起因地非寬此一人也不應以此一人而非薄一切菩薩也酤酒第一不得酤三昧法酒此是菩薩鴆聲聞既自飲矣復酤與人當比何例耶有佛可成有衆生可度有法可説是菩薩酤酒業犯此者同聲聞例現有説戒之釋迦作度生成佛津梁又比何例一切衆生已成佛竟已度生竟已涅槃竟則千百億釋迦將千百億酒望子早已拆倒矣説四衆過過者過也既已過矣又何説焉然則十重四十八輕何以説歟楞嚴云不住名客住名主人過有客義菩薩心地有常住義善來亦客惡來亦客客非常住常住不為客受過常住非客客不為常住生過然主人之待客則有道矣主人辨客又辨常住但令知過但令悔過而不説過以其為客義非常住義也客有非法非律亦有法律常住無法律亦無非法非律彼惡人者方以非法非律疑主人而不知法律之為客菩薩説而誤之使失大乘善信則終已不識常住成一闡提矣闡提不識常住而有常住常住非過非無過也闡提之過且無可説況菩薩四衆過耶自讚毀他無離他之自亦無離自之他若曰第一義為自世諦為他性為自習氣為他無為為自有為為他皆自讚毀他也惡向自好與他亦自讚毀他也惡果在他安能向自好果在自安能與他衆生見衆生之惡菩薩惟見衆生之好耳讚歎不及禮拜有分則加衆生以毀辱者豈直菩薩受之元是一體即三世諸佛受之本無二體代之之云猶隔膜也菩薩示一切衆生相衆生現一切佛相法性自爾非退己非讓人我得佛汝不得佛謂之隱他人好事令他人受毀直饒我得佛汝亦得佛仍是隱他人好事令他人受毀慳惜加毀盡大地是富足人無端現此乞相菩薩贈衣裏之神珠奉金瓶而灌頂蓋彼所自有人所共有也起一我與之之見即是加毀而況慳惜齊之餓者不食嗟來之食亦乞相中富足家風可起德色之愧盡大地是貧窮人不知貧窮之妙忽然來乞菩薩以少法與之便害其命此不為説一句一偈一微塵許法可謂真善知識矣吾許其罵盡一切乞兒而經不許恐去年無地今歲無錐猶未到此境界也雖然真到此境界更須行乞始得瞋不受悔遺教云清冷雲中霹𮦷起火非所應也清冷雲中不礙霹𮦷起火特非常住法耳霹𮦷火非常住法清冷雲亦非常住法有瞋不解豈知不可解之瞋即念念滅乎瞋念念滅罵字字滅打下下滅罵不見打打不聞罵口不知手手不知刀杖刀杖不知瞋瞋不知念念滅念念滅各不自知而瞋有不解是之謂不可解一切衆生即非衆生不必更用情恕更用理遣矣誰是瞋者誰當瞋者瞋者現衆生相謝者現非衆生相現非衆生者識瞋者之非衆生現衆生者不識謝者之非衆生得則兩得失亦兩失菩薩亦有不受悔者不知過性之不可得是人為不善悔也則非菩薩不受悔無如其受過何也過無受處悔亦無受處謂之善悔善受謗三寶三寶非他常住佛性是常住佛性非他一切衆生心是於心外求三寶名曰外道於三寶中捨衆生名曰二乘惡人謗佛則菩薩如刺心以其謗心也衆生是佛是增益謗衆生非佛是減損謗亦是亦非是相違謗不是不非是戲論謗心以謗為義以衆生為心即謗衆生以三寶為心即謗三寶以非衆生非三寶為心即謗心一切皆謗而全心始獨露矣菩薩能如是謗乃稱不謗彌勒云謗菩薩藏説相似法熾然建立楞伽所謂受貪瞋癡性已然後妄想計著曰貪瞋癡性非性佛法之滅實由於此戒所以云救也若以受持為實法即相似法以無受無持為實法亦相似法以無實法為實法亦相似法教人十重皆一自作二教人是菩薩正指或於教人中分輕重云名與利屬己則重屬人則輕非也菩薩度生為第一事以惡法教人損第一行違第一願正破第一戒豈暇問名利之在己在人耶且菩薩寧自破戒墮那落迦必不忍坐視人破戒墮那落迦則與其名利在人而人犯重不如名利在己而人犯輕也此皆依小乘律以解大乘失佛本意又云前四重事同七遮悔與不悔悉障後六者悔非障不悔則障或云前四須悔見相非障後六不悔亦不障佛説十無盡藏戒品初無差別若論菩薩道小乘制前四於己分中狹而粗大乘制後六於人分中廣而細也若重在教人則不教悔罪何以結輕曰彼已有罪不教之悔則輕此本無罪教之犯故重耳惡心持犯法先觀因地經所云惡心者有心即惡也有自利心即利養有利他心即名聞有有所求有所得心即利養有無所求無所得心即名聞有心即犯無心即持此本自性清淨地也有則染汙矣欲受故取己取則受菩薩於一切法先斷受一切不受亦非斷受失位犯重失一切位乃至失一切妙果不云失菩提心菩提心無可失故故云不得現身發菩提心不得發耳非無菩提心也墮三惡道是誰墮不聞父母三寶名字是誰不聞一念回光全身透出方知從地獄中徑生兜率聞天鼓音立證十地本無階漸故聲聞戒有得有失菩薩戒無得無失佛性常住非得失故彼一闡提悉得受記信亦不得不信亦不失故經四十八輕不敬師友師有不可見者佛性也師有可見者和尚阿闍黎也不與我為侶者師也與我為侶者同學同行同見也從侶以見其所不侶從可見以得其所不可見敢不敬耶欲受教者空諸所有身與國城妻子七寶百物不敢不賣特買之者如娶蟲耳知其無售主則一針一草亦不可留是為真法供養飲酒聞衆生有常住佛性便隨衆生妄想流注此醉人也盛酒之器有罍有尊酌酒之器有杯有杓皆取受法於無有中過人以取受法不知其無酒亦無器非五百世安能知其無手耶食肉菩薩有殺而不食食者受用之義也殺貪瞋癡必無受用貪瞋癡者殺無明煩惱必無受用無明煩惱者菩薩有長養而不食長養六度亦無受用六度者長養萬行亦無受用萬行者是故菩薩不受食食即肉耳食五辛修心地法者於菩薩道中少有些子氣息即犯五辛況於食功德肉而肥飲戒定神通酒而醉耶不教悔罪菩薩不許説過而許舉罪蓋不舉不悔則使一切衆生於罪法中常住也罪法不常住即是常失罪法不常住義即失佛性常住義矣生佛前佛後為八難之一何云佛前佛後耶不信衆生是佛當面蹉過謂之佛前佛後餘七難皆從此一難而生或曰而今己生佛後正好時時悔罪若作此見直待婁至下生猶隔三阿僧祇劫在不供給請法菩薩有本師友有因緣師友有一切處師友此以有來有去為因緣師友也所謂大乘法者能消一切食所謂學大乘法者能滅一切身能消一切食故堪供養能滅一切身故堪禮拜若爾則法師與請法師者同於一切時説法也何啻三時懈怠不聽法一切處有講法毗尼經律只此是天鼓鳴無人解聽也解聽者閙處靜處近處遠處皆法師提唱處經律論己所曰有但持至彼所一回印證耳若未解聽且向高座前領取背大向小全心是大乘常住經律全佛説是心忽起背向不知全背向是心也於此一肩擔荷尚不受持大乘常住經律豈更受持二乘外道惡見經律噫信此固不易矣不得已而聽其進退惟佛能耐煩為難然亦非耐煩一筋斗去十萬八千里不出如來掌中耳不看病視一切病人如佛猶是看病者視一切佛如病人則大醫王矣何謂父母師僧弟子諸根不具百種病是到家病是根本病何謂僧坊城邑曠野山林道路中病是未到家病是支末病支末令識根本未到家令到家此救濟法也根本令生支末到家令出門此供養法也畜殺衆生具常非常我非我解脫非解脫違順不安之相皆殺氣也法非法律非律持犯非持犯皆殺具也畜之復何害但滅二見刀杖弓箭俱發蓮華菩薩時張四面大網羅以取衆生不罥其腳國使菩薩心地如轉輪聖王無餘小王敢逆顏行無餘小王能為伴侶今以兩國之勢興師相伐是對治法之最下者菩薩甘為之使可謂顛倒見矣使者為一國使賊者為兩國賊蓋於一法界中立異殺無量衆生冀成佛道佛道必不成非徒賊衆生又賊佛也故曰明與無明愚夫見二智者了達其性無二無二之性即是實性販賣良人者本性是奴婢者六根是六畜者六塵是販來賣去壓良為賤即外道種一口棺材盛却死漢是二乘種謗毀一切衆生從本無事所謂良人善人也法師師僧國王貴人本四衆三身相六親本三世法現行三世本不與一切因緣和合流入五道本不染汗此中尚無不犯七逆十重者豈有犯七逆十重者而言其犯七逆十重斯謂之無事謗他耳於大虗空無彩可畫無毒可塗彼惡心者自見其加於逆害墮不如意處不知本無事中孝順心慈悲心置之如意處皆多事也放火焚燒物各有依如蚖蛇戀窟菩薩以大火燒之使豁然見赤骨力地境界此解脫方便也逐動則戀觀山林曠野待其入而燒之守靜則戀止人家僧舍待其出而燒之出而復入不見其所止入而復出不見其所觀則方便成矣善治醫者以藥去醫不傷其眼不善治者醫眼俱失於出時燒其出於入時燒其入者是也菩薩有時壞世界有時成世界有時與一切有時奪一切奪與與皆與成與壞皆成僻教自佛弟子及外道惡人六親皆是一切善知識盡大地無一毛頭許惡知識故乃全部大乘經律非語言文字相也信此者謂之發菩提心修此者謂之次第法用衆生有橫死緣蓋不應死而死同在四通八達之塗忽為一人引入迂遠險惡道中作橫死漢不謂之惡心瞋心不可得矣雖然彼非惡心瞋心此亦非橫死識得一切善知識元在四通八達之塗也伯樂教其所愛弟子相凡馬教其所憎弟子相千里馬凡馬常有則售千里馬非常有則不售也夫不相凡馬豈能相千里馬既能識千里馬豈不識凡馬伯樂非愛憎障乃其弟子為凡馬千里馬所障耳二乘求千里馬於馬外外道以凡馬為千里馬彼得其天機於牝牡驪黃之表者亦未嘗得之於鹿豕之群也為利倒説卞法界同此一性一性即正法正法即三寶以身見起障故不現前燒身臂指供養諸佛捨身肉手足供養餓虎狼師子及一切餓鬼但辦肯心必不相賺或謂虎狼師子不解説法曰諸佛更不解説法然則當於何求曰即於汝求我已捨身更教誰求曰汝不捨身誰教汝求世間興利必先除害此未識次第義菩薩除害則先除利是之謂有前有後也功德天至黑暗女便至有智主人二俱不受始得心開意解耳恃勢乞求國王王子大臣百官即三寶尊重相不著佛求不著法求不著僧求是真親近以有所求為親近以親近為形勢便是客作漢推窮內外中間則現乞索相斷除起滅則現打拍相於一切時管帶則現牽挽相有取有得如貧暴富則現橫取財物相此無所得法也復何所求有求即多有求即惡矣彼亦以親近三寶故求而不知直下無求之為三寶學菩薩者能識此病始不自誤誤人何謂誤人教人求者是無解作師佛性之性即衆生清淨自性以其非衆生故曰佛性以其併非佛故曰佛性之性也十二部經攝於一句一偈百千恆河沙法門開於一毛頭許是菩薩戒律因緣若不證此即誦得十二部經正是一一不解一切法不知者一即一一一切法即一法不疑一切法乃能不疑衆生性不疑衆生性乃能不疑佛性不疑非佛非衆生性乃能不疑佛性之性此義理非二乘所解二乘知一法不知一切法故雖然不知一切法亦不可云知一法也兩舌手執香爐行中道義遘鬬兩頭著有著無著有者以不著有為著無著無者以不著無為著有成人之非則謗成己之是則欺彼真賢人豈被謗欺此兩舌者無惡不造而已不行放救先身本體即佛性義佛性即四大四大即六道六道即父母父母即常住法我生生無不從之受生是衆生無常變異法也誰生生誰受生誰無常變異不可無常住不變異法也有受生者即有受老受病受死者於生老病死苦見常住法即見諸佛生生受生常住之法別求寂滅即殺父母殺故身也行放生業一以救錯認無生者是名講菩薩戒死而不亡別求壽命不得見佛成墮落因講菩薩戒一以救妄修不死者是名行放生業瞋打報讐劫火燒海底風鼓山相擊真常寂滅樂涅槃相如是菩薩以正法眼觀器世間一切衆生純一佛性無雜無壞為之恭敬圍繞以諸香花而散其處是大涅槃相非死義而有大死義放生無放殺生無殺其理俱銷謂有放者則元不生謂有殺者則元不死君親不死而云實死斯為不孝耳若然者彼殺即生我殺亦生殺復何礙曰彼殺即生則不用報我殺亦生又安用殺譬如夢醒無續夢法若然者彼生即死我放亦死殺又何礙曰彼生即死殺者見生我放亦死放者見殺譬如夢魘有喚魘法此菩薩於如幻三昧中行如幻行而不取著也造七逆罪生陷地獄此一闡提大寂滅幢也或謂一闡提斷佛性一闡提即佛性又如何斷佛謂殺一闡提無罪佛即一闡提又如何殺外記云天無二日民無二王家無二主尊無二上造七逆罪者蓋得此旨欲於一切處造七逆罪自不畜奴婢始憍慢不請法小姓年少卑門貧窮下賤諸根不具正是第一義諦彼觀種姓而生憍慢蓋始出家未有所解耳非俗所訶初世為人者耶僻説解大乘經律則於一切衆生不敢起輕心惡心慢心況新學菩薩乎新學者或於佛菩薩像前受戒已成佛當成佛同此一心顯不從人得也使無好心誰有好相新學菩薩或於法師前受戒可見師不可見師同此一相顯不從佛得也即無好相元有好心此法師內倚己外倚人問者之好心與好相俱現而答者之好相與好心俱隱矣不習學佛捨正見正性正法身而為雜學是棄黃金取瓦礫也若得正見正性正法身不妨拈瓦礫作黃金且非勸人雜學不善知衆三寶物者菩薩與衆生續佛慧命之物皆自己物也菩薩有此自己衆生亦有此自己識得自己始能善守善守者莫無度用而已大圓鏡不守自性不自為主發普賢差別智行而用之以自己入用自己物聽於長子蔚為家法佛所以不終滅度也菩薩見他人物如自己物一切珍重衆人見自己物如他人物一切暴殄自他分而諍訟起矣故以一切衆生為自己者使一切衆生識自己始可知衆獨受利養先住為主後來為客客未能住反客為主宜給所須使知住法客已能住反主為客宜均所請使知無住法客與主舊住與新住住與無住無二體故不給所須客不得住是外道惡不均所請客但得住是二乘惡受別請才有味著便受別請漸成祕重則回十方僧物八福田中物入己矣公物不宜私用此千華臺上所為和盤托出也別請僧別請五百羅漢菩薩僧不如僧次一凡夫僧非為聖凡難測若存此是仍是別請但識心地法即識凡夫僧但識凡夫僧即識心地法方知五百羅漢菩薩僧真不如僧次一凡夫僧矣主人遣癡童子錯請客人是別請義云外道法者心外別求故不順孝道者背一本故邪命自活菩薩於正命食亦不取而況邪命凡涉於心思口習身手造作而成者皆和合因緣法也以因緣為實法生取受心即是和合百種毒藥千種毒藥蛇毒生金銀毒蠱毒矣彼以自活適以自戕不敬好時全身是三寶無親者故無謗者有親相即自身與三寶成兩兩即成謗不見一切處三寶矣全身在空中全空在有中有説空者有行有者亦復成兩不見一切處空矣全身在好時中有三齋月有六齋日即有好時與非好時亦復成兩不見一切處好時矣析一切處三寶謂之殺生壞一切處空謂之劫盜隔別一切處好時謂之破齋犯戒世所云敬好時者菩薩云不敬好時也菩薩無一剎那頃非好時故即得一切處空見一切處三寶故色領六塵即貫十二處十八界色領五陰即貫七大凡夫二乘皆迷於色法不見一切處空則一切處三寶隱矣一切處好時從此蹉過經每舉男女二相以攝色法即攝一切法蓋縛著之總司也此觀行入路不行救贖好一自性清淨無端投入六道即是賣佛菩薩父母形像矣賣法寶賣僧寶賣發菩提心人一串穿却去作官便作奴婢哀哉此中有自賣者有被人掠賣者亦有能自贖者有待人贖者諸佛菩薩日走外道及一切惡人劫賊邊行贖人事耳此外道惡人劫賊或內自起或外相值決定被賣不得解脫十重四十八輕戒使之內不自起外不相值猶是第二著若識得自性清淨總將外道惡人劫賊一串穿却作我官使作我奴婢損害衆生全體是衆生全衆生是體忽起疑團已折寸草成刀杖弓箭矣於沒量大人分上自生短見跳入輕稱小斗中不運糞出而運糞入倚自聰明取人財物心心獨脫作解脫想便被繫縛佛佛現前作成功想早已破壞但圖對治貓狸豬狗滿屋紛然良由不識衆生長養如是惡習邪業覺觀雖小道必由覺觀入覺者觀前之警敏觀者覺後之精深也入正覺觀時人不可得法不可得見色聞聲不可得巧拙勝負不可得禍福倚伏趨避不可得神通遊戲不可得寂然不動亦不可得少一生心即以覺觀為盜賊使命矣覺觀為一切法使命覺觀無罪誤用者其罪菩薩用覺觀而禁邪業故覺觀成使命之功暫念小乘大乘善信信我是佛而已我是佛不可衆生非佛佛與我與衆生同此一心而已念為心所發心為念所歸念念不去心蓋滴滴歸源也二乘不敢用相續心菩薩能用相續心以徹見法源故世諦論水河為源海為委第一義諦論水海為源河為委盡法界是心豈有出法界之念暫起毫髮之疑全成差別之相於無去處而見去故於無相續處而用相續耳不發願衆生之妄想即菩薩之弘願一切波羅蜜菩薩一手持之一念不捨蓋全用貧全用執著而未嘗異於一心父母師僧一心三寶耳非一心法非師非友非一心法非經非律非一心法非住非行非向非地非一心法非解非行非持戒則此大願盡未來際不出一心願雖廣而難竟心則約而易操也心是實相故不名妄心是本有相故不名貪心是堅固無動之相故不名執著心祇一念一念具三世故曰念念念念不去心元祇一念也過去心不可得現在心不可得未來心不可得有過去現在未來即無不可得者無過去現在未來亦無不可得者菩薩於念念中無有見無無見無可得見無不可得見此之謂一念不發誓願不易發發不易持以有無始習氣故以苦切之誓持之也破戒由於身心然破戒非身心之罪持戒非身心之功以此身心破戒則破戒不以此身心破戒則持戒以不以在此一人而此一人亦不任功亦不任罪何也此一人亦身心亦非身心亦以亦非以亦不以亦非不以亦持亦破亦非持非破亦佛亦衆生亦非佛非衆生亦成亦不成亦非成非不成亦此一人亦非此一人法華云是法非思量分別之所能及即不用思量分別雖然不用思量分別非思量分別之所能及矣用思量分別亦豈思量分別之所能及耶用不用且置現前思量分別即非思量分別又豈用不用之所能及耶前云發一切願願孝順父母師僧此云願一切衆生悉得成佛頭正尾正生我者父母成我者師僧以自性清淨為戒體則一切衆生皆有父母師僧義故發此平等普願謂之遍一切處孝順陳平曰非魏無知何由得進漢高帝曰若子可謂不背本矣冒難遊行自性清淨未嘗與四威儀相捨一念捨自性即入惡國界見惡國王矣此疑網所罥也疑自性平等故見高下疑自性顯露故見深邃疑自性大慈故見師子虎狼疑自性大定故見水火風難疑自性無所有故見劫賊疑自性無礙故見毒蛇於自性清淨無一念頃疑即無一寸許地是遊行難處當處解脫當處寂滅舉足下足無非安居其作安居見作遊行見作一切難處見結一切難處戒皆自生異見耳乖尊卑次序一切法有老有少有貴有賤則以之為先後我法無之各具三世誰是少者各具三世誰是老者各具一佛性誰是賤者各具一佛性誰是貴者惟受戒之先後為先後則一盧舍那千百億釋迦無量衆生入菩薩道中如赤珠幢重重影現皆一味平等觀矣於無先後示有先後以尊卑而成次序亦因次序而成尊卑佛行次禮塔阿難曰是誰塔佛曰過去佛塔阿難曰是誰弟子佛曰是吾弟子阿難曰應當如是不修福慧識建立之本慧海交光識講説之本福田滿載如何是本問取一切行道處問取一切衆生患難亡滅處問取一切大火大水黑風羅剎一切罪報人多淫多瞋多愚癡多疾病者揀擇受戒疏云身形不如應揀擇業障不如應揀擇此亦揀其所可揀擇其所可擇耳若佛性種子直是無下手處出家人識得此意不拜國王不拜父母六親不敬鬼神不禮不為分外彼菩薩法師擬向戒壇中下手才起心時失却兩眼識得壞色便解法師語矣如何是壞色一切染是國人覆染顯一切真比丘覆真顯一切壞菩薩於不壞見壞於壞見不壞而各不染此法師語也雲棲辨直受菩薩戒之非但解法師語即直受菩薩戒未為不可不但解法師語即不受菩薩戒未為不可祇是罕遇其人為利作師大鑒不識一字而得法中意若依文講照册宣正是詐現能解耳法中無意意在法中法中意者第一義有諦而第一義諦無第一義習種無性性有習種性種無性性有性種道種無性性有道種正法無性性有正法則發趣無性性有發趣長養無性性有長養不可壞無性性有不可壞其中觀行無出入而觀行出入有多少十禪支無一一禪支有十乃至百千意活而法自活法死則意亦死得法中意者七遮可以現身受戒犯重比丘可以立證無生無戒可持無罪可滅無好相可見無三十心十地可歷無妙覺可成為惡人説戒佛性有國王義衆生心中有佛性不可國人心中無國王也執塗之人問之曰汝有王否耶對曰我無王則必有不道之誅矣塗之人心中皆有王佛性義如是執塗之人自頂至踵絲分縷切求王之形似了不可得衆生有佛性義亦如是而外道邪見人遂謂衆生心中無佛性語國王曰爾所有國土若干人心皆有爾國王則王喜爾所有國土若干人心皆無爾國王則王怒以語國土中若干人則泛泛然聽之漠然不相關若以語犯上作亂者爾所國土若干人心中有國王則怒爾所國土若干人心中無國王則喜矣菩薩為國王説佛性戒不為未受菩薩戒者若外道惡人説義亦如是無慚受施無一人無一時不在國王地上行此受佛戒者所為步步行空也起心毀戒便有腳迹來則鬼遮去則鬼掃飲國王水化為猛火則檀越供養全成三惡道滓矣國王地國王水一塵一渧宛然如故此空中迹從何而來空本無迹亦不受掃識此顛倒無顛倒者是賊是鬼皆在赫赫天光師子座前不供養經典皮血骨髓難捨能捨不必作筆墨紙觀即有字有義全經也竹木絹素當其未書不云為我書戒當其已書不云我為戒書七寶箱囊當其未盛不云為我盛經當其已盛不云我為經盛即空無相無願全身也菩薩於受持無受持見是名一心於供養有供養見不名如法不化衆生汝是畜生發菩提心畜生若無菩提心即無可發若有菩提心又如何發不聞菩薩喚曰汝是畜生耶奚不直喚曰汝非畜生非畜生是何物是畜生又是何物不煩周折説法不如法法有遮有表以聽衆為衆生相本身盧舍那無一時不堂堂示現此無見頂相也衆生不見故説以表之法師現盧舍那相聽衆現千百億釋迦相一衆生身法相體爾一一衆生身法相體爾合一一衆生身為一身法相體爾若捨高座等一地立則無所表千釋迦從蓮華臺藏世界沒入體性虗空華光三昧不見有盧舍那不見有釋迦蓋遮義也出體性虗空華光三昧坐菩提樹於釋迦見盧舍那於聽衆見千釋迦蓋表義也宜遮而表宜表而遮謂之非時説有能為無説無示之聽者乎即遮表俱置一切時如法矣非法制限世界空國土空衆生空是三寶法空無邊三寶無量於空中取一瓶空曰是彼分空不得增一分於一一瓶立瓶數立瓶中空數曰是彼分空不得增一分蓋白衣愚法也聲聞有制限法此是三寶數此非三寶數此得三寶此失三寶此有三寶此無三寶謂之非法制限菩薩於受無制限施無制限取攝無制限學無制限教無制限方無制限世無制限法無可制限故三寶無量割少分以為三寶空無邊析少分以為空空不受析三寶不受割法不受破特為是非見所垢耳故曰心同虗空界示等虗空法證得虗空時無是無非法嗚呼非利根上智安能證耶破法自性清淨本來解脫千佛大戒制其不如自性清淨者如其本來解脫而已是故以性用戒不以戒用性菩薩於一切法用而不著發菩提心不著菩提心行六波羅蜜不著六波羅蜜得阿耨多羅三藐三菩提不著阿耨多羅三藐三菩提説法不著説法度衆生不著度衆生有著即破有取即著此經結戒之末隨豎隨掃始終以性用戒不以戒用性蓋識主也凡結聲聞戒説濁藏過結菩薩戒説清邊過聲聞戒為凡夫説菩薩戒并不為聖人説未可雷同一例耳經流通分流通水之為物始於濫觴達為江河歸則溟渤蓋有能流之力而後能通然或至於壅塞阻截而不流者亦必有能通之力而後能流也故一曰流則通一日通則流流則通者性義通則流者教義流則通者本覺義通則流者始覺義戒之義先通而後流而仍諸之流通者非有能流則無能通所以定一尊於佛性也此佛性常住戒卷元在一切衆生心中破此徵塵出此大經佛任其通而衆生始得其流衆生既得其流即亦各任其通化化不絶衆生法爾千佛法爾盧舍那現釋迦釋迦現盧舍那無量無邊不可思議神力不出衆生家常行履一衆生如是千百億衆生如是微塵衆生亦如是一佛如是千百億佛如是微塵佛亦如是一世界如是千百億世界如是微塵世界亦如是一法藏如是千百億法藏如是微塵法藏亦如是所謂恆河沙不可説法門略開一毛頭許而一毛頭許亦不立此通之至也一毛頭許不立而恆河沙不可説法門一切俱立此流之至也非能通則無所流而非能流則無所通一切佛一切菩薩於一切衆生所受如上心地法門品竟因果佛性常住藏因果佛性常住藏疏分為二因果即佛性常住無可分也因果即解脫佛性即般若常住即寂滅常住即般若佛性即解脫因果即寂滅因果即般若佛性即寂滅常住即解脫三非三一非一一切法藏悉如是説
